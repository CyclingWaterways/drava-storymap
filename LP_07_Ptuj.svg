<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
    <!-- Background -->
    <rect width="600" height="400" fill="#10b981"/>
    
    <!-- Icon -->
    
            <g opacity="0.35">
                <circle cx="300" cy="160" r="45" fill="none" stroke="white" stroke-width="5"/>
                <circle cx="300" cy="160" r="28" fill="none" stroke="white" stroke-width="5"/>
                <circle cx="300" cy="160" r="11" fill="white"/>
            </g>
        
    
    <!-- Location name -->
    <text x="300" y="270" 
          font-family="Arial, sans-serif" 
          font-size="32" 
          font-weight="bold" 
          fill="#ffffff" 
          text-anchor="middle">Ptuj</text>
    
    <!-- Type label -->
    <text x="300" y="310" 
          font-family="Arial, sans-serif" 
          font-size="20" 
          font-weight="normal" 
          fill="#ffffff" 
          text-anchor="middle" 
          opacity="0.85">Center</text>
    
    <!-- PLACEHOLDER text -->
    <text x="300" y="350" 
          font-family="Arial, sans-serif" 
          font-size="16" 
          font-weight="normal" 
          fill="#ffffff" 
          text-anchor="middle" 
          opacity="0.6">PLACEHOLDER</text>
</svg>